<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Cosplay Rental PH</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <ul class="nav-links"></ul>
        <div class="nav-actions">
            <div class="profile-dropdown" style="display: none;"><div class="user-greeting"><i class="fas fa-user-circle"></i><span id="profileName"></span></div>
                <div class="dropdown-content" id="profileDropdownMenu">
                    <a href="#" id="accountSettingsBtn"><i class="fas fa-user-edit"></i> Account Settings</a>
                    <a href="#" id="paymentSettingsBtn"><i class="fas fa-credit-card"></i> Payment Settings</a>
                    <a href="#" id="themeToggleBtn"><i class="fas fa-moon"></i> Dark/Light Mode</a><hr><a href="#" id="dropdownLogoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
            <span id="userNameDisplay" class="user-greeting" style="display: none;"></span>
            <button id="logoutBtn" class="btn-outline" style="display: none;">Logout</button>
            <button id="openAuthBtn" class="btn-primary" style="display: none;">Login</button>
        </div>
        <div class="logo"><a href="index.html"><i class="fas fa-dragon"></i><span>Cosplay Rental<span class="ph">PH</span></span></a></div>
    </div>
</nav>
<main class="admin-dashboard">
    <div class="dashboard-header-large"><h1><i class="fas fa-crown"></i> Admin Panel</h1><p>Manage users, verify owners, oversee platform</p></div>
    <div class="admin-stats"><div class="stat-card"><i class="fas fa-users"></i><div><span id="totalUsers" class="stat-number">0</span><span class="stat-label">Users</span></div></div><div class="stat-card"><i class="fas fa-user-clock"></i><div><span id="pendingOwnersCount" class="stat-number">0</span><span class="stat-label">Pending Owners</span></div></div><div class="stat-card"><i class="fas fa-tshirt"></i><div><span id="totalCosplaysAdmin" class="stat-number">0</span><span class="stat-label">Cosplays</span></div></div></div>
    <div class="admin-card"><div class="card-header"><h2>Pending Owner Approvals</h2></div><div id="pendingOwnersList"></div></div>
    <div class="admin-card"><div class="card-header"><h2>User Management</h2><button id="addUserBtn" class="btn-outline btn-small">Add User</button></div><div id="allUsersList"></div></div>
    <div class="admin-card"><div class="card-header"><h2>All Cosplays</h2><button id="adminAddCosplayBtn" class="btn-primary btn-small">Add Cosplay</button></div><div class="inventory-grid" id="adminCosplaysList"></div></div>
</main>
<footer class="site-footer">...</footer>
<script type="module" src="script.js"></script>
</body>
</html>
