<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Wishlist - Cosplay Rental PH</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <ul class="nav-links"></ul>
        <div class="nav-actions">
            <div class="profile-dropdown" style="display: none;"><div class="user-greeting"><i class="fas fa-user-circle"></i><span id="profileName"></span></div>
                <div class="dropdown-content" id="profileDropdownMenu">
                    <a href="#" id="accountSettingsBtn"><i class="fas fa-user-edit"></i> Account Settings</a>
                    <a href="#" id="paymentSettingsBtn"><i class="fas fa-credit-card"></i> Payment Settings</a>
                    <a href="#" id="themeToggleBtn"><i class="fas fa-moon"></i> Dark/Light Mode</a><hr><a href="#" id="dropdownLogoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
            <span id="userNameDisplay" class="user-greeting" style="display: none;"></span>
            <button id="logoutBtn" class="btn-outline" style="display: none;">Logout</button>
            <button id="openAuthBtn" class="btn-primary" style="display: inline-flex;">Login</button>
        </div>
        <div class="logo"><a href="index.html"><i class="fas fa-dragon"></i><span>Cosplay Rental<span class="ph">PH</span></span></a></div>
    </div>
</nav>
<main class="wishlist-main">
    <div class="wishlist-actions"><button id="suggestBtn" class="btn-primary"><i class="fas fa-plus"></i> Suggest a Costume</button></div>
    <div id="wishlistIdeas" class="wishlist-ideas-grid"></div>
</main>
<div id="suggestModal" class="modal-overlay" style="display:none;"><div class="modal-content"><h3>Suggest a Costume</h3><input type="text" id="suggestName" placeholder="Costume name"><textarea id="suggestDesc" placeholder="Description (optional)"></textarea><div class="modal-actions"><button id="submitSuggestion">Submit</button><button id="closeSuggestModal">Cancel</button></div></div></div>
<footer class="site-footer">...</footer>
<script type="module" src="script.js"></script>
</body>
</html>
